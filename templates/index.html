<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Komuta Paneli</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #a855f7; 
            --primary-glow: rgba(168, 85, 247, 0.4);
            --bg-dark: #070a13; 
            --card-bg: #111827; 
            --border-color: rgba(168, 85, 247, 0.2);
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 50px 20px;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(59, 7, 100, 0.3) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(20, 10, 60, 0.3) 0%, transparent 40%);
            overflow-y: auto; 
            min-height: 100vh;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 60px;
        }

        .header h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #fff 0%, #a855f7 50%, #6366f1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
            text-shadow: 0 0 15px var(--primary-glow);
        }

        .search-area {
            display: flex;
            gap: 15px;
            background: rgba(17, 24, 39, 0.7);
            padding: 25px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            border: 1px solid var(--border-color);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5), inset 0 0 15px rgba(168, 85, 247, 0.1);
            margin-bottom: 50px;
            position: sticky;
            top: 20px;
            z-index: 100;
        }

        input {
            flex: 1;
            padding: 18px 25px;
            border-radius: 14px;
            border: 1px solid #1f2937;
            background: #070a13;
            color: white;
            font-size: 1.1rem;
            transition: 0.3s;
            outline: none;
            font-family: 'JetBrains Mono', monospace;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        button {
            padding: 18px 40px;
            border-radius: 14px;
            border: none;
            background: linear-gradient(135deg, #a855f7 0%, #6366f1 100%);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1rem;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(168, 85, 247, 0.5);
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(450px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(168, 85, 247, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            border-left: 4px solid var(--primary) !important; 
        }

        .card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: rgba(168, 85, 247, 0.5);
            box-shadow: 0 20px 50px -10px rgba(168, 85, 247, 0.3);
        }

        .badge {
            background: rgba(168, 85, 247, 0.15) !important; 
            color: var(--primary) !important; 
            padding: 6px 15px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid rgba(168, 85, 247, 0.3) !important; 
        }

        .card h3 {
            margin: 0;
            font-size: 1.4rem;
            color: #f1f5f9;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .code-box {
            background: #05070a;
            padding: 18px;
            border-radius: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            color: #d8b4fe;
            border: 1px solid #1f2937;
            margin-bottom: 25px;
            word-break: break-all;
            position: relative;
        }

        .code-box::after {
            content: 'DORK';
            position: absolute;
            top: -10px;
            right: 15px;
            background: var(--card-bg);
            padding: 0 8px;
            font-size: 0.7rem;
            color: var(--primary);
            font-weight: bold;
            border-radius: 4px;
        }

        .btn-run {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: 0.3s;
            padding: 8px 15px;
            border-radius: 8px;
        }

        .btn-run:hover {
            color: white;
            background: rgba(168, 85, 247, 0.1);
        }

        /* --- NOKTA NAVİGASYONU (DOT PAGINATION) --- */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 50px;
            margin-bottom: 30px;
        }

        .page-dot {
            width: 12px;
            height: 12px;
            background: rgba(168, 85, 247, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .page-dot:hover {
            background: rgba(168, 85, 247, 0.5);
            transform: scale(1.2);
        }

        .page-dot.active {
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
            border-color: var(--primary);
            transform: scale(1.3);
        }

        .loading {
            text-align: center;
            color: var(--primary);
            font-weight: bold;
            display: none;
            font-size: 1.2rem;
            margin-top: 30px;
            text-shadow: 0 0 10px var(--primary-glow);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>GDork</h1>
    </div>

    <div class="search-area">
        <input type="text" id="target" placeholder="Hedef domaini analiz et(örn: example.com)">
        <button onclick="yeniAnaliz()">Analizi Başlat</button>
    </div>

    <div id="loader" class="loading">verileri işleniyor...</div>
    <div id="sonuclar" class="results-grid"></div>
    <div id="pagination" class="pagination"></div>
</div>

<script>
    let tumVeriler = [];
    let aktifSayfa = 1;
    const dorkLimit = 10;

    document.getElementById('target').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            yeniAnaliz();
        }
    });

    async function yeniAnaliz() {
        const hedef = document.getElementById('target').value;
        const sonucAlani = document.getElementById('sonuclar');
        const loader = document.getElementById('loader');
        const paginationAlani = document.getElementById('pagination');

        if (!hedef) { 
            alert("Lütfen bir hedef domain girin!"); 
            return; 
        }

        sonucAlani.innerHTML = "";
        paginationAlani.innerHTML = "";
        loader.style.display = "block";

        try {
            const yanit = await fetch('/api/sorgula?hedef=' + encodeURIComponent(hedef));
            tumVeriler = await yanit.json();
            
            loader.style.display = "none";
            aktifSayfa = 1;
            ekranGuncelle();
        } catch (hata) {
            loader.style.display = "none";
            sonucAlani.innerHTML = "<p style='color:#ef4444; text-align:center; font-weight:bold;'>Baglanti hatasi: Istihbarat verileri alinamadi.</p>";
        }
    }

    function ekranGuncelle() {
        const sonucAlani = document.getElementById('sonuclar');
        const paginationAlani = document.getElementById('pagination');
        sonucAlani.innerHTML = "";
        paginationAlani.innerHTML = "";

        // 10'arlı dilimleme
        const baslangic = (aktifSayfa - 1) * dorkLimit;
        const bitis = baslangic + dorkLimit;
        const sayfaVerisi = tumVeriler.slice(baslangic, bitis);

        sayfaVerisi.forEach(d => {
            sonucAlani.innerHTML += `
                <div class="card">
                    <div class="card-header">
                        <span class="badge">${d.kategori}</span>
                    </div>
                    <h3>${d.baslik}</h3>
                    <div class="code-box">
                        ${d.sorgu}
                    </div>
                    <div class="card-footer">
                        <a href="${d.link}" target="_blank" class="btn-run">
                            <span>Google Analizi</span>
                            <span>↗</span>
                        </a>
                    </div>
                </div>
            `;
        });

        // Nokta butonlarını oluştur
        const toplamSayfa = Math.ceil(tumVeriler.length / dorkLimit);
        for (let i = 1; i <= toplamSayfa; i++) {
            const dot = document.createElement('div');
            dot.className = `page-dot ${i === aktifSayfa ? 'active' : ''}`;
            dot.onclick = function() {
                aktifSayfa = i;
                ekranGuncelle();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };
            paginationAlani.appendChild(dot);
        }
    }
</script>

</body>
</html>
